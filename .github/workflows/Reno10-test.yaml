name: Build TWRP Reno10

on:
  workflow_dispatch: # 手动触发编译

jobs:
  build:
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: 检出代码
      uses: actions/checkout@v3

    - name: 清理磁盘空间 (极其重要)
      run: |
        sudo docker image prune -a -f
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc
        sudo rm -rf /usr/local/share/boost
        sudo rm -rf "$AGENT_TOOLSDIRECTORY"

    - name: 安装依赖
      run: |
        sudo apt-get update
        sudo apt-get install -y bc build-essential zip curl libc6-dev libncurses5-dev libssl-dev python3 python-is-python3 repo

    - name: 设置 Repo 工具
      run: |
        mkdir ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 同步 TWRP 源码 (12.1 分支)
      run: |
        mkdir work
        cd work
        git config --global user.name "AI"
        git config --global user.email "ai@example.com"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -j$(nproc --all) --force-sync

    - name: 载入设备树
      run: |
        # 1. 先把当前仓库的文件（设备树）移动到一个临时目录，避免 cp 时的递归冲突
        mkdir -p temp_device_tree
        # 排除 .git 和 work 目录，拷贝其余所有文件
        rsync -av --exclude='.git' --exclude='work' ./ temp_device_tree/
        
        # 2. 创建目标路径并移动过去
        cd work
        mkdir -p device/oppo/PHW110
        cp -r ../temp_device_tree/* device/oppo/PHW110/
        
        # 3. 验证一下文件是否放对了（可选，方便看日志排错）
        ls -R device/oppo/PHW110

    - name: 开始编译
      run: |
        cd work
        source build/envsetup.sh
        # 使用你提到的 omni_lahaina
        lunch omni_lahaina-eng
        # 编译 boot
        mka bootimage -j$(nproc)

    - name: 上传镜像
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Recovery
        path: |
          work/out/target/product/PHW110/*.img
          work/out/target/product/PHW110/*.zip
