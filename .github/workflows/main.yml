name: Build TWRP - OPPO K11 (Taylor)

on:
  workflow_dispatch:
  push: 

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
    - name: 1. 清理磁盘空间 (防止空间不足)
      run: |
        sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc /usr/local/share/boost /usr/lib/jvm
        sudo apt clean

    - name: 2. 准备编译环境
      run: |
        sudo apt update
        sudo apt install -y git-core gnupg flex bison build-essential zip curl zlib1g-dev gcc-multilib g++-multilib \
        libc6-dev-i386 libncursesw5 libncurses-dev x11proto-core-dev libx11-dev lib32z1-dev libgl1-mesa-dev \
        libxml2-utils xsltproc unzip fontconfig python3 python-is-python3

    - name: 3. 安装 Repo 工具
      run: |
        mkdir -p ~/bin
        curl https://storage.googleapis.com/git-repo-downloads/repo > ~/bin/repo
        chmod a+x ~/bin/repo
        sudo ln -sf ~/bin/repo /usr/bin/repo

    - name: 4. 同步 TWRP 源码 (12.1 分支)
      run: |
        mkdir twrp
        cd twrp
        git config --global user.email "twrp@build.me"
        git config --global user.name "twrp"
        repo init --depth=1 -u https://github.com/minimal-manifest-twrp/platform_manifest_twrp_aosp.git -b twrp-12.1
        repo sync -j$(nproc) --force-sync --no-tags --no-clone-bundle

    - name: 5. 克隆设备树
      run: |
        cd twrp
        git clone https://github.com/WenHao-Dev/twrp_device_oppo_taylor.git device/oppo/taylor
        rm -r device/oppo/taylor/prebuilts/Image
        wget https://github.com/miaizhe/twrp_device_oppo_taylor/releases/download/boot/Image -o device/oppo/taylor/prebuilts/

    - name: 6. 开始全量镜像编译
      run: |
        cd twrp
        source build/envsetup.sh
        export ALLOW_MISSING_DEPENDENCIES=true
        lunch twrp_taylor-eng
        # 对于 A/B 设备，强制编译所有可能包含 Recovery 的目标
        mka bootimage -j$(nproc)

    - name: 7. 上传产物
      uses: actions/upload-artifact@v4
      with:
        name: TWRP-Taylor-Images
        path: |
          twrp/out/target/product/taylor/boot.img
          twrp/out/target/product/taylor/vendor_boot.img
          twrp/out/target/product/taylor/recovery.img
          twrp/out/target/product/taylor/*.zip
