name: Generate TWRP Device Tree

on:
  workflow_dispatch:
    inputs:
      boot_url:
        description: '请输入 boot.img 的直接下载链接'
        required: true
        type: string

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: 检出仓库
        uses: actions/checkout@v4

      - name: 安装 Python 环境
        run: |
          sudo apt-get update
          sudo apt-get install -y python3 python3-pip
          pip3 install twrpdtgen

      - name: 下载 boot.img
        run: |
          wget -O boot.img "${{ github.event.inputs.boot_url }}"
          if [ ! -f boot.img ]; then echo "下载失败！"; exit 1; fi

      - name: 执行逆向生成
        run: |
          mkdir output
          python3 -m twrpdtgen boot.img -o output/

      - name: 上传设备树
        uses: actions/upload-artifact@v4
        with:
          name: TWRP-Device-Tree-Generated
          path: output/
